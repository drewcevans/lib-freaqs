<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LiB Freaqs ⚡</title>
    <script>
      // GitHub Pages SPA redirect — encodes the path as a query param
      // so the main index.html can decode it and restore the correct route.
      // pathSegmentsToKeep = 1 keeps the /lib-freaqs/ base segment.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
